<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var path = window.location.pathname;
    var repo = '/Silverstone-California';
    if (path.startsWith(repo + '/portal')) {
      var portalPath = path.replace(repo + '/portal', '');
      window.location.replace(repo + '/portal/index.html?route=' + encodeURIComponent(portalPath));
    }
  </script>
</head>
<body>
  <h1>Page not found</h1>
  <p><a href="/Silverstone-California/">Back to home</a></p>
</body>
</html>
